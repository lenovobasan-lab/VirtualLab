<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Simple Pendulum Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0f1e;
    color: #e0eaff;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  h1 { font-size: 1rem; color: #7ab3ff; margin: 10px 0 4px; letter-spacing: .05em; }
  canvas { display: block; }
  #controls {
    display: flex; gap: 12px; align-items: center;
    padding: 8px 16px; background: rgba(255,255,255,0.05);
    border-radius: 12px; margin: 6px 0; flex-wrap: wrap; justify-content: center;
  }
  label { font-size: 0.75rem; color: #8eaacc; }
  input[type=range] { width: 100px; accent-color: #4d8eff; }
  #values { font-size: 0.7rem; color: #5a7ea8; min-width: 80px; text-align:center; }
  button {
    padding: 6px 14px; border-radius: 8px; border: 1px solid #4d8eff44;
    background: #4d8eff22; color: #7ab3ff; cursor: pointer; font-size: 0.8rem;
    transition: background 0.2s;
  }
  button:hover { background: #4d8eff44; }
</style>
</head>
<body>
<h1>🔬 Simple Pendulum Simulation</h1>
<div id="controls">
  <label>Length
    <input type="range" id="lengthSlider" min="60" max="220" value="150" />
  </label>
  <label>Gravity
    <input type="range" id="gravitySlider" min="1" max="20" value="9.8" step="0.1" />
  </label>
  <label>Damping
    <input type="range" id="dampSlider" min="0" max="0.05" value="0.002" step="0.001" />
  </label>
  <div id="values">T = – s</div>
  <button id="resetBtn">Reset</button>
  <button id="pauseBtn">Pause</button>
</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = Math.max(window.innerHeight - 110, 300);
}
resize();
window.addEventListener("resize", resize);

let L = 150, g = 9.8, damp = 0.002;
let angle = Math.PI / 4, vel = 0;
let paused = false;
let trail = [];
const MAX_TRAIL = 120;

const lenSlider  = document.getElementById("lengthSlider");
const gravSlider = document.getElementById("gravitySlider");
const dampSlider = document.getElementById("dampSlider");
const valDiv     = document.getElementById("values");
const resetBtn   = document.getElementById("resetBtn");
const pauseBtn   = document.getElementById("pauseBtn");

lenSlider.addEventListener("input",  () => { L = +lenSlider.value;  trail = []; });
gravSlider.addEventListener("input", () => { g = +gravSlider.value; });
dampSlider.addEventListener("input", () => { damp = +dampSlider.value; });
resetBtn.addEventListener("click",   () => { angle = Math.PI / 4; vel = 0; trail = []; });
pauseBtn.addEventListener("click",   () => { paused = !paused; pauseBtn.textContent = paused ? "Play" : "Pause"; });

let prev = performance.now();

function draw(now) {
  requestAnimationFrame(draw);
  const dt = Math.min((now - prev) / 1000, 0.03);
  prev = now;

  if (!paused) {
    const acc = -(g / L) * Math.sin(angle) - damp * vel;
    vel   += acc * dt;
    angle += vel * dt;
  }

  const period = 2 * Math.PI * Math.sqrt(L / g);
  valDiv.textContent = `T = ${period.toFixed(2)} s\nθ = ${(angle * 180 / Math.PI).toFixed(1)}°`;

  ctx.fillStyle = "#0a0f1e";
  ctx.fillRect(0, 0, W, H);

  const ox = W / 2, oy = 50;
  const px = ox + L * Math.sin(angle);
  const py = oy + L * Math.cos(angle);

  // trail
  trail.push([px, py]);
  if (trail.length > MAX_TRAIL) trail.shift();
  for (let i = 1; i < trail.length; i++) {
    const alpha = i / trail.length;
    ctx.beginPath();
    ctx.moveTo(trail[i-1][0], trail[i-1][1]);
    ctx.lineTo(trail[i][0],   trail[i][1]);
    ctx.strokeStyle = `rgba(77,142,255,${alpha * 0.5})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // pivot
  ctx.beginPath();
  ctx.arc(ox, oy, 6, 0, Math.PI * 2);
  ctx.fillStyle = "#4d8eff";
  ctx.fill();

  // rod
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(px, py);
  ctx.strokeStyle = "#4d8eff88";
  ctx.lineWidth = 2;
  ctx.stroke();

  // glow
  const grd = ctx.createRadialGradient(px, py, 0, px, py, 28);
  grd.addColorStop(0,   "rgba(77,142,255,0.35)");
  grd.addColorStop(1,   "transparent");
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(px, py, 28, 0, Math.PI * 2);
  ctx.fill();

  // bob
  ctx.beginPath();
  ctx.arc(px, py, 16, 0, Math.PI * 2);
  ctx.fillStyle = "#4d8eff";
  ctx.fill();
  ctx.strokeStyle = "#7ab3ff";
  ctx.lineWidth = 2;
  ctx.stroke();

  // equilibrium line
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(ox, oy + L);
  ctx.strokeStyle = "#ffffff11";
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.stroke();
  ctx.setLineDash([]);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
