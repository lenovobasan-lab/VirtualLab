<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Fractions Simulator</title>
    <style>
        :root {
            --bg-grad-1: #e0eafc;
            --bg-grad-2: #cfdef3;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            
            --color-whole: #3b82f6;
            --color-slice: #22c55e;
            --color-borrow: #f97316;
            --color-remove: #ef4444;
            --color-equiv: #a855f7;
            --color-result: #eab308;
            
            --text-main: #1e293b;
            --text-light: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 20px;
            width: 100%;
        }

        h1 { text-align: center; color: #334155; margin-bottom: 20px; font-size: 2rem; }

        .app-layout { display: flex; align-items: flex-start; gap: 20px; width: 100%; max-width: 1500px; }

        .control-panel { flex: 0 0 300px; width: 300px; }

        .main-column { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 20px; }

        @media (max-width: 900px) { .app-layout { flex-direction: column; } .control-panel { flex: 1 1 auto; width: 100%; } }

        .layout-top { display: flex; flex-direction: column; gap: 14px; align-items: center; }

        .fraction-input-card { background: rgba(255,255,255,0.5); border-radius: 15px; padding: 15px; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.8); width: 100%; }

        .fraction-input-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }

        .frac-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }

        .frac-line { width: 40px; height: 3px; background: var(--text-main); border-radius: 2px; }

        input[type="number"] { width: 50px; height: 40px; font-size: 1.2rem; text-align: center; border: 2px solid #cbd5e1; border-radius: 8px; background: white; outline: none; }
        
        select { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; cursor: pointer; }

        .op-select { font-size: 2rem; font-weight: bold; color: var(--color-whole); background: transparent; border: none; cursor: pointer; }

        .controls-row { display: flex; flex-direction: column; gap: 10px; margin: 15px 0 0; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); }

        button { padding: 10px 18px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; color: white; width: 100%; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-play { background: #10b981; }
        .btn-pause { background: #f59e0b; }
        .btn-step { background: #3b82f6; }
        .btn-reset { background: #ef4444; }
        .btn-random { background: #8b5cf6; }

        .speed-control { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.6); border-radius: 10px; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.8); }
        .speed-control label { font-weight: 600; color: var(--text-main); white-space: nowrap; }
        .speed-control input[type="range"] { flex: 1 1 auto; min-width: 0; accent-color: var(--color-whole); cursor: pointer; }
        .speed-control #speed-label { font-weight: 700; color: var(--color-whole); min-width: 38px; text-align: center; }

        .vis-row { display: flex; gap: 20px; margin-bottom: 20px; align-items: stretch; }

        .visualization-container { flex: 1 1 70%; min-width: 0; height: 700px; background: #ffffff; border-radius: 15px; position: relative; overflow: hidden; }

        svg { width: 100%; height: 100%; display: block; }

        .working-sidebar { flex: 0 0 280px; height: 700px; background: rgba(255,255,255,0.6); border-radius: 15px; padding: 18px; border: 1px solid rgba(255,255,255,0.8); display: flex; flex-direction: column; overflow: hidden; }
        .working-sidebar .panel-title { flex: 0 0 auto; }
        .working-sidebar .math-working { flex: 1 1 auto; overflow-y: auto; justify-content: flex-start; padding-top: 10px; }

        @media (max-width: 900px) { .vis-row { flex-direction: column; } .visualization-container, .working-sidebar { flex: 1 1 auto; width: 100%; height: 480px; } }

        .panels-row { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .explanation-panel, .math-panel { background: rgba(255,255,255,0.6); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.8); }
        .panel-title { font-weight: bold; color: var(--color-whole); margin-bottom: 10px; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
        .step-text { font-size: 1.1rem; line-height: 1.5; }
        .math-working { font-family: monospace; font-size: 1.3rem; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .math-step-line { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
        .math-step-line.visible { opacity: 1; transform: translateY(0); }
        .tooltip { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.9rem; pointer-events: none; opacity: 0; z-index: 10; }
    </style>
</head>
<body>
    <h1>Interactive Fraction Visualizer(Developed by Basanta)</h1>
    <div class="app-layout">
        <div class="glass-card control-panel">
            <div class="layout-top">
                <div class="fraction-input-card">
                    <h3>Fraction 1</h3>
                    <select id="type-f1" onchange="ui.updateInputVisibility('f1')">
                        <option value="proper">Proper / Improper</option>
                        <option value="mixed">Mixed Number</option>
                    </select>
                    <div class="fraction-input-row">
                        <input type="number" id="w-f1" value="0" min="0" style="display:none;">
                        <div class="frac-col">
                            <input type="number" id="n-f1" value="3" min="0">
                            <div class="frac-line"></div>
                            <input type="number" id="d-f1" value="4" min="1" max="12">
                        </div>
                    </div>
                </div>
                <select id="operator" class="op-select"><option value="+">+</option><option value="-">-</option></select>
                <div class="fraction-input-card">
                    <h3>Fraction 2</h3>
                    <select id="type-f2" onchange="ui.updateInputVisibility('f2')">
                        <option value="proper">Proper / Improper</option>
                        <option value="mixed">Mixed Number</option>
                    </select>
                    <div class="fraction-input-row">
                        <input type="number" id="w-f2" value="0" min="0" style="display:none;">
                        <div class="frac-col">
                            <input type="number" id="n-f2" value="1" min="0">
                            <div class="frac-line"></div>
                            <input type="number" id="d-f2" value="4" min="1" max="12">
                        </div>
                    </div>
                </div>
            </div>
            <div class="controls-row">
                <button class="btn-play" id="btn-play" onclick="sim.play()">▶ Play</button>
                <button class="btn-pause" id="btn-pause" onclick="sim.pause()" disabled>⏸ Pause</button>
                <button class="btn-step" id="btn-step" onclick="sim.nextStep()">⏭ Next Step</button>
                <button class="btn-reset" onclick="sim.reset()">↺ Reset</button>
                <button class="btn-random" onclick="ui.randomize()">🎲 Random Example</button>
                <div class="speed-control">
                    <label for="speed-slider">🐢 Speed</label>
                    <input type="range" id="speed-slider" min="0.25" max="3" step="0.25" value="1" oninput="ui.updateSpeed()">
                    <span id="speed-label">1x</span>
                </div>
            </div>
        </div>
        <div class="main-column">
            <div class="glass-card">
                <div class="vis-row">
                    <div class="visualization-container" id="vis-container">
                        <svg id="canvas" viewBox="0 0 1250 700" preserveAspectRatio="xMidYMid meet"></svg>
                        <div id="tooltip" class="tooltip"></div>
                    </div>
                    <div class="working-sidebar">
                        <div class="panel-title">Working</div>
                        <div id="math-working" class="math-working"></div>
                    </div>
                </div>
                <div class="panels-row">
                    <div class="explanation-panel"><div class="panel-title">Explanation</div><div id="explanation-text" class="step-text">Enter fractions and click Play or Next Step.</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MathUtils = {
            gcd: (a, b) => b === 0 ? Math.abs(a) : MathUtils.gcd(b, a % b),
            lcm: (a, b) => (Math.abs(a * b)) / MathUtils.gcd(a, b),
            simplify: (n, d) => {
                if (n === 0) return { n: 0, d: 1 };
                const g = MathUtils.gcd(n, d);
                return { n: n / g, d: d / g };
            },
            toImproper: (w, n, d) => ({ n: (w * d) + n, d: d }),
            toMixed: (n, d) => ({ w: Math.floor(n / d), n: n % d, d: d })
        };

        class Fraction {
            constructor(w, n, d) {
                this.w = parseInt(w) || 0;
                this.n = parseInt(n) || 0;
                this.d = parseInt(d) || 1;
            }
            get totalSlices() { return (this.w * this.d) + this.n; }
            get improper() { return MathUtils.toImproper(this.w, this.n, this.d); }
            static fromImproper(n, d) { const m = MathUtils.toMixed(n, d); return new Fraction(m.w, m.n, m.d); }
            clone() { return new Fraction(this.w, this.n, this.d); }
            toHTML() {
                if (this.n === 0) return `${this.w}`;
                const frac = `<sup>${this.n}</sup>&frasl;<sub>${this.d}</sub>`;
                return this.w === 0 ? frac : `${this.w} ${frac}`;
            }
        }

        const SVGUtils = {
            createEl: (tag, attrs) => {
                const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
                for (let k in attrs) el.setAttribute(k, attrs[k]);
                return el;
            },
            polarToCartesian: (cx, cy, r, angleDeg) => {
                const rad = (angleDeg - 90) * Math.PI / 180.0;
                return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };
            },
            describeArc: (cx, cy, r, startAngle, endAngle) => {
                const start = SVGUtils.polarToCartesian(cx, cy, r, endAngle);
                const end = SVGUtils.polarToCartesian(cx, cy, r, startAngle);
                const large = (endAngle - startAngle <= 180) ? "0" : "1";
                if(endAngle - startAngle >= 359.9) return `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx} ${cy + r} A ${r} ${r} 0 1 1 ${cx} ${cy - r}`;
                return `M ${start.x} ${start.y} A ${r} ${r} 0 ${large} 0 ${end.x} ${end.y} L ${cx} ${cy} Z`;
            },
            // SVG <text> elements can't render HTML tags - a string like "<sup>1</sup>&frasl;<sub>2</sub>"
            // assigned via textContent shows the literal tags instead of a stacked fraction. This walks the
            // markup (sup/sub + plain text/entities) and rebuilds it as <tspan>s with baseline shifts so
            // fraction labels render correctly inside SVG.
            setFractionLabel: (textEl, htmlString) => {
                while (textEl.firstChild) textEl.removeChild(textEl.firstChild);
                const SHIFT = 10;
                const temp = document.createElement('div');
                temp.innerHTML = htmlString;
                let level = 0; // 0 = baseline, 1 = superscript, -1 = subscript
                const levelOf = tag => tag === 'sup' ? 1 : (tag === 'sub' ? -1 : 0);
                const addPiece = (text, lvl) => {
                    if (text === '') return;
                    const dy = (level - lvl) * SHIFT;
                    const tspan = SVGUtils.createEl("tspan", { dy: dy, "font-size": lvl !== 0 ? "0.7em" : "1em" });
                    tspan.textContent = text;
                    textEl.appendChild(tspan);
                    level = lvl;
                };
                temp.childNodes.forEach(node => {
                    if (node.nodeType === Node.TEXT_NODE) addPiece(node.textContent, 0);
                    else if (node.nodeType === Node.ELEMENT_NODE) addPiece(node.textContent, levelOf(node.tagName.toLowerCase()));
                });
            }
        };

        const Colors = { whole: '#3b82f6', slice: '#22c55e', result: '#eab308' };

        let speedFactor = 1;

        class TweenEngine {
            constructor() { this.tweens = []; this.reqId = null; this.isPaused = false; }
            start() { if(!this.reqId) this.tick(); }
            tick() {
                this.reqId = requestAnimationFrame(() => this.tick());
                if (this.isPaused) return;
                const now = performance.now();
                for (let i = this.tweens.length - 1; i >= 0; i--) {
                    let t = this.tweens[i];
                    t.elapsed += 16;
                    let p = Math.min(t.elapsed / t.duration, 1);
                    t.onUpdate(p);
                    if (p >= 1) { if(t.onComplete) t.onComplete(); this.tweens.splice(i, 1); }
                }
            }
            to(obj, props, duration) {
                return new Promise(resolve => {
                    let start = {}; for(let k in props) start[k] = obj[k];
                    const scaledDuration = Math.max(16, duration / speedFactor);
                    this.tweens.push({ elapsed: 0, duration: scaledDuration, onUpdate: (p) => { for(let k in props) obj[k] = start[k] + (props[k] - start[k]) * p; if(obj.render) obj.render(); }, onComplete: resolve });
                });
            }
            wait(ms) { return new Promise(r => setTimeout(r, Math.max(0, ms / speedFactor))); }
        }

        const engine = new TweenEngine();

        // Parse a hex color (#rgb or #rrggbb) into {r,g,b}. Falls back gracefully for non-hex (e.g. named) colors.
        function parseColor(c) {
            if (!c) return { r: 226, g: 232, b: 240 };
            if (c[0] === '#') {
                let hex = c.slice(1);
                if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
                const num = parseInt(hex, 16);
                return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
            }
            // unknown format, just return a neutral grey
            return { r: 226, g: 232, b: 240 };
        }
        function lerpColor(c1, c2, p) {
            const a = parseColor(c1), b = parseColor(c2);
            const r = Math.round(a.r + (b.r - a.r) * p);
            const g = Math.round(a.g + (b.g - a.g) * p);
            const bl = Math.round(a.b + (b.b - a.b) * p);
            return `rgb(${r}, ${g}, ${bl})`;
        }

        class RenderSlice {
            constructor(parent, cx, cy, r, sa, ea, color) {
                this.el = SVGUtils.createEl("path", { fill: color, stroke: '#fff', "stroke-width": 1.5 });
                parent.appendChild(this.el);
                this.state = { cx, cy, r, sa, ea, x: 0, y: 0, scale: 1, rot: 0, opacity: 1, color };
                this.render();
            }
            render() {
                const s = this.state;
                this.el.setAttribute("d", SVGUtils.describeArc(s.cx, s.cy, s.r, s.sa, s.ea));
                this.el.setAttribute("fill", s.color);
                this.el.setAttribute("transform", `translate(${s.x}, ${s.y}) rotate(${s.rot}, ${s.cx}, ${s.cy}) scale(${s.scale})`);
                this.el.setAttribute("opacity", s.opacity);
            }
            // Smoothly animate this slice's fill color, opacity, and (optionally) scale to new values over `duration` ms.
            // Color is interpolated channel-by-channel (not a plain number), so this drives its own
            // small rAF loop rather than going through TweenEngine.to().
            animateTo(color, opacity, duration, scale) {
                duration = Math.max(16, duration / speedFactor);
                const fromColor = this.state.color;
                const fromOpacity = this.state.opacity;
                const fromScale = this.state.scale;
                const toScale = (scale === undefined) ? fromScale : scale;
                const slice = this;
                return new Promise(resolve => {
                    const start = performance.now();
                    function step(now) {
                        const p = Math.min((now - start) / duration, 1);
                        const eased = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; // easeInOutQuad
                        slice.state.color = lerpColor(fromColor, color, eased);
                        slice.state.opacity = fromOpacity + (opacity - fromOpacity) * eased;
                        slice.state.scale = fromScale + (toScale - fromScale) * eased;
                        slice.render();
                        if (p < 1) requestAnimationFrame(step);
                        else resolve();
                    }
                    requestAnimationFrame(step);
                });
            }
            // Fly this slice from its current on-screen position to a brand-new pie-center/angle/color, tracing
            // a gentle arc (via a lifted midpoint) so the motion reads as a deliberate "joining" hop rather than
            // a straight slide. Also re-targets the slice's own cx/cy/sa/ea so future renders use the new geometry.
            // `liftY` controls how high the arc rises above the straight line (negative = rises upward).
            flyTo({ cx, cy, sa, ea, color, opacity, duration, liftY = -70 }) {
                duration = Math.max(16, duration / speedFactor);
                const s = this.state;
                const fromCx = s.cx, fromCy = s.cy, fromSa = s.sa, fromEa = s.ea;
                const fromColor = s.color, fromOpacity = s.opacity;
                const toColor = (color === undefined) ? fromColor : color;
                const toOpacity = (opacity === undefined) ? fromOpacity : opacity;
                const slice = this;
                return new Promise(resolve => {
                    const start = performance.now();
                    function step(now) {
                        const p = Math.min((now - start) / duration, 1);
                        const eased = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; // easeInOutQuad
                        // arc lift uses a separate sine-shaped curve peaking at the midpoint of travel
                        const arc = Math.sin(eased * Math.PI) * liftY;
                        s.cx = fromCx + (cx - fromCx) * eased;
                        s.cy = fromCy + (cy - fromCy) * eased + arc;
                        s.sa = fromSa + (sa - fromSa) * eased;
                        s.ea = fromEa + (ea - fromEa) * eased;
                        s.color = lerpColor(fromColor, toColor, eased);
                        s.opacity = fromOpacity + (toOpacity - fromOpacity) * eased;
                        slice.render();
                        if (p < 1) requestAnimationFrame(step);
                        else {
                            s.cx = cx; s.cy = cy; s.sa = sa; s.ea = ea;
                            slice.render();
                            resolve();
                        }
                    }
                    requestAnimationFrame(step);
                });
            }
            destroy() { if(this.el.parentNode) this.el.parentNode.removeChild(this.el); }
        }

        class FractionGroup {
            constructor(svg, x, y, denom, color, label) {
                this.svg = svg; this.startX = x; this.startY = y; this.denom = denom; this.color = color;
                this.group = SVGUtils.createEl("g", {}); this.svg.appendChild(this.group); this.slices = [];
                if (label) {
                    this.labelEl = SVGUtils.createEl("text", { x: x, y: y - 115, "text-anchor": "middle", "font-size": "26", "font-weight": "bold", fill: "#475569" });
                    SVGUtils.setFractionLabel(this.labelEl, label);
                    this.group.appendChild(this.labelEl);
                }
            }
            // Geometry for slot `idx` (0-based, across however many circles are needed) given a denom and an
            // anchor position. Shared by build() and by the join/detach fly animations in Step 3.
            static slotFor(startX, startY, denom, idx) {
                const c = Math.floor(idx / denom);
                const i = idx % denom;
                const cx = startX + c * 230;
                const sa = i * (360 / denom), ea = (i + 1) * (360 / denom);
                return { cx, cy: startY, sa, ea };
            }
            // build slices representing `total` filled slices out of denom-per-circle, with `wholeCount` full blue circles.
            // Returns a Promise that resolves once all slice animations finish, so callers can await it for smooth pacing.
            build(total, wholeCount, color) {
                const d = this.denom;

                // If the denominator (slice angle per piece) changed since the last build, old slice
                // geometry is no longer valid (different arc widths) - rebuild fresh instead of reusing.
                if (this._lastDenom !== undefined && this._lastDenom !== d) {
                    this.slices.forEach(s => s.destroy());
                    this.slices = [];
                }
                this._lastDenom = d;

                const circlesNeeded = Math.max(1, Math.ceil(total / d));
                const targetCount = circlesNeeded * d;
                const animations = [];

                for (let c = 0; c < circlesNeeded; c++) {
                    let cx = this.startX + c * 230;
                    for (let i = 0; i < d; i++) {
                        const idx = c * d + i;
                        const filled = idx < total;
                        const isWhole = c < wholeCount;
                        const sa = i * (360 / d), ea = (i + 1) * (360 / d);
                        const fillColor = !filled ? '#e2e8f0' : (isWhole ? Colors.whole : (color || this.color));
                        const targetOpacity = !filled ? 0.35 : 1;
                        const delay = idx * 25; // gentle stagger so the change sweeps across slices rather than popping at once

                        let slice = this.slices[idx];
                        if (slice) {
                            // existing slice: smoothly transition its color/opacity in place
                            const anim = engine.wait(delay).then(() => slice.animateTo(fillColor, targetOpacity, 550));
                            animations.push(anim);
                        } else {
                            // new slice (e.g. a newly needed circle): create it small/transparent then grow + fade in
                            slice = new RenderSlice(this.group, cx, this.startY, 95, sa, ea, fillColor);
                            slice.state.opacity = 0;
                            slice.state.scale = 0.4;
                            slice.render();
                            this.slices[idx] = slice;
                            const anim = engine.wait(delay).then(() => slice.animateTo(fillColor, targetOpacity, 550, 1));
                            animations.push(anim);
                        }
                    }
                }

                // remove any leftover slices beyond what's now needed (e.g. result group shrank)
                for (let idx = targetCount; idx < this.slices.length; idx++) {
                    if (this.slices[idx]) this.slices[idx].destroy();
                }
                this.slices.length = targetCount;

                return Promise.all(animations).then(() => circlesNeeded);
            }
            moveLabel(text) { if (this.labelEl) SVGUtils.setFractionLabel(this.labelEl, text); }
            // Remove slice `idx` from this group's bookkeeping WITHOUT destroying its DOM element or resetting
            // its visual state - used when a slice is being handed off to another group (e.g. flying into Result).
            // The element keeps rendering wherever its <g> currently lives until the caller re-parents it.
            takeSlice(idx) {
                const slice = this.slices[idx];
                this.slices[idx] = null;
                return slice;
            }
            // Re-parent an externally-owned RenderSlice's DOM element into this group's <g>, without touching
            // its current animated state (position/color/opacity carry over so the fly animation looks continuous).
            adoptSlice(slice) {
                this.group.appendChild(slice.el);
            }
            destroy() { this.slices.forEach(s => { if (s) s.destroy(); }); if (this.labelEl && this.labelEl.parentNode) this.labelEl.parentNode.removeChild(this.labelEl); }
        }

        class Simulation {
            constructor() {
                this.svg = document.getElementById('canvas');
                this.steps = [];
                this.stepIndex = -1;
                this.playing = false;
                engine.start();
            }

            clearCanvas() { this.svg.innerHTML = ''; }

            setExplanation(html) { document.getElementById('explanation-text').innerHTML = html; }

            addMathLine(html) {
                const container = document.getElementById('math-working');
                const line = document.createElement('div');
                line.className = 'math-step-line';
                line.innerHTML = html;
                container.appendChild(line);
                requestAnimationFrame(() => requestAnimationFrame(() => line.classList.add('visible')));
            }

            clearMath() { document.getElementById('math-working').innerHTML = ''; }

            readInputs() {
                const f1 = new Fraction(document.getElementById('w-f1').value, document.getElementById('n-f1').value, document.getElementById('d-f1').value);
                const f2 = new Fraction(document.getElementById('w-f2').value, document.getElementById('n-f2').value, document.getElementById('d-f2').value);
                const op = document.getElementById('operator').value;
                return { f1, f2, op };
            }

            // Build the ordered list of step functions (each returns a Promise) for the current inputs.
            buildSteps() {
                const { f1, f2, op } = this.readInputs();
                const imp1 = f1.improper; // {n, d}
                const imp2 = f2.improper;
                const lcd = MathUtils.lcm(imp1.d, imp2.d);
                const n1 = imp1.n * (lcd / imp1.d);
                const n2 = imp2.n * (lcd / imp2.d);
                const resultNumerator = op === '+' ? (n1 + n2) : (n1 - n2);
                const simplified = MathUtils.simplify(Math.abs(resultNumerator), lcd);
                const isNegative = resultNumerator < 0;
                const mixedResult = MathUtils.toMixed(simplified.n, simplified.d);

                const steps = [];

                // STEP 0: show original fractions
                steps.push(() => {
                    this.clearCanvas();
                    this.f1G = new FractionGroup(this.svg, 220, 190, f1.d, Colors.slice, `Fraction 1: ${f1.toHTML()}`);
                    this.f2G = new FractionGroup(this.svg, 220, 490, f2.d, Colors.slice, `Fraction 2: ${f2.toHTML()}`);
                    const anim = Promise.all([
                        this.f1G.build(f1.totalSlices, f1.w),
                        this.f2G.build(f2.totalSlices, f2.w)
                    ]);
                    this.setExplanation(`We start with two fractions: <b>${f1.toHTML()}</b> and <b>${f2.toHTML()}</b>. We want to compute <b>${f1.toHTML()} ${op} ${f2.toHTML()}</b>.`);
                    this.clearMath();
                    this.addMathLine(`${f1.toHTML()} &nbsp;${op}&nbsp; ${f2.toHTML()}`);
                    return anim.then(() => engine.wait(500));
                });

                // STEP 1: convert to improper fractions (if needed)
                if (f1.w !== 0 || f2.w !== 0) {
                    steps.push(() => {
                        this.f1G.moveLabel(`Fraction 1: ${imp1.n}/${imp1.d}`);
                        this.f2G.moveLabel(`Fraction 2: ${imp2.n}/${imp2.d}`);
                        const anim = Promise.all([
                            this.f1G.build(imp1.n, 0, Colors.slice),
                            this.f2G.build(imp2.n, 0, Colors.slice)
                        ]);
                        this.setExplanation(`Convert any mixed numbers to improper fractions so the wholes and parts are combined: <b>${f1.toHTML()} = ${imp1.n}/${imp1.d}</b> and <b>${f2.toHTML()} = ${imp2.n}/${imp2.d}</b>.`);
                        this.addMathLine(`= ${imp1.n}/${imp1.d} &nbsp;${op}&nbsp; ${imp2.n}/${imp2.d}`);
                        return anim.then(() => engine.wait(500));
                    });
                }

                // STEP 2: find common denominator (if needed)
                if (imp1.d !== imp2.d) {
                    steps.push(() => {
                        this.f1G.moveLabel(`Fraction 1: ${n1}/${lcd}`);
                        this.f2G.moveLabel(`Fraction 2: ${n2}/${lcd}`);
                        this.f1G.denom = lcd;
                        this.f2G.denom = lcd;
                        const anim = Promise.all([
                            this.f1G.build(n1, 0, Colors.slice),
                            this.f2G.build(n2, 0, Colors.slice)
                        ]);
                        this.setExplanation(`Find the least common denominator of ${imp1.d} and ${imp2.d}, which is <b>${lcd}</b>. Rewriting each fraction with this denominator gives <b>${n1}/${lcd}</b> and <b>${n2}/${lcd}</b>.`);
                        this.addMathLine(`= ${n1}/${lcd} &nbsp;${op}&nbsp; ${n2}/${lcd}`);
                        return anim.then(() => engine.wait(500));
                    });
                }

                // STEP 3: physically move slices into a result group - addition slices fly in and JOIN;
                // for subtraction, the minuend's slices land first, then the subtracted slices DETACH and
                // drift away while the remaining slices consolidate into place.
                steps.push(() => {
                    const FLY_DURATION = 1100;   // slower than before per request - each slice's flight time
                    const STAGGER = 90;           // gap between each slice starting its flight
                    const SETTLE_PAUSE = 700;     // breathing room after all motion finishes

                    this.resultG = new FractionGroup(this.svg, 620, 340, lcd, Colors.result, op === '+' ? 'Joining the slices…' : 'Result');
                    const opWord = op === '+' ? 'Combine' : 'Take away';
                    this.setExplanation(`${opWord} the slices: ${n1} ${op === '+' ? '+' : '-'} ${n2} = <b>${resultNumerator}</b> slice${Math.abs(resultNumerator) === 1 ? '' : 's'} out of ${lcd}.`);
                    this.addMathLine(`= ${isNegative ? '-' : ''}${Math.abs(resultNumerator)}/${lcd}`);

                    // Grab the actual filled RenderSlice instances from f1G and f2G (indices 0..n-1 are filled,
                    // since build() always fills the lowest indices first).
                    const f1Filled = []; for (let i = 0; i < n1; i++) f1Filled.push(this.f1G.takeSlice(i));
                    const f2Filled = []; for (let i = 0; i < n2; i++) f2Filled.push(this.f2G.takeSlice(i));

                    const flights = [];
                    let delay = 0;

                    if (op === '+') {
                        // ADDITION: every filled slice from both fractions flies into consecutive result
                        // slots and joins the result color - a literal merge of the two piles.
                        const incoming = [...f1Filled, ...f2Filled];
                        incoming.forEach((slice, k) => {
                            const slot = FractionGroup.slotFor(620, 340, lcd, k);
                            this.resultG.adoptSlice(slice);
                            this.resultG.slices[k] = slice;
                            const d = delay;
                            flights.push(engine.wait(d).then(() => slice.flyTo({
                                ...slot, color: Colors.result, opacity: 1, duration: FLY_DURATION, liftY: -80
                            })));
                            delay += STAGGER;
                        });
                    } else {
                        // SUBTRACTION: f1's slices fly into the result first, landing in order...
                        f1Filled.forEach((slice, k) => {
                            const slot = FractionGroup.slotFor(620, 340, lcd, k);
                            this.resultG.adoptSlice(slice);
                            this.resultG.slices[k] = slice;
                            const d = delay;
                            flights.push(engine.wait(d).then(() => slice.flyTo({
                                ...slot, color: Colors.result, opacity: 1, duration: FLY_DURATION, liftY: -80
                            })));
                            delay += STAGGER;
                        });
                    }

                    // f2's now-empty/unused slices (the leftover slots beyond n2 in f2G) and f1's leftover
                    // empty slots just fade away quietly in place - they were never filled, so no flight needed.
                    const fadeAnims = [];
                    for (let i = n1; i < this.f1G.slices.length; i++) {
                        const s = this.f1G.slices[i];
                        if (s) fadeAnims.push(s.animateTo(s.state.color, 0, 500));
                    }
                    for (let i = (op === '+' ? n2 : 0); i < this.f2G.slices.length; i++) {
                        const s = this.f2G.slices[i];
                        if (s) fadeAnims.push(s.animateTo(s.state.color, 0, 500));
                    }

                    let sequence = Promise.all([...flights, ...fadeAnims]).then(() => {
                        this.f1G.destroy();
                        this.f2G.destroy();
                    });

                    if (op === '-') {
                        // ...then, once landed, the last n2 of those slices DETACH from the result: they shrink,
                        // fade, and drift downward off the pie, like pieces being physically removed.
                        sequence = sequence.then(() => engine.wait(250)).then(() => {
                            this.resultG.moveLabel('Taking slices away…');
                            const detachAnims = [];
                            let dDelay = 0;
                            for (let k = n1 - 1; k >= n1 - n2; k--) {
                                const slice = this.resultG.slices[k];
                                this.resultG.slices[k] = null;
                                if (!slice) continue;
                                const s = slice.state;
                                const d = dDelay;
                                detachAnims.push(engine.wait(d).then(() => slice.flyTo({
                                    cx: s.cx, cy: s.cy + 160, sa: s.sa, ea: s.ea,
                                    color: Colors.remove, opacity: 0, duration: 900, liftY: 40
                                })).then(() => slice.destroy()));
                                dDelay += STAGGER;
                            }
                            return Promise.all(detachAnims);
                        }).then(() => engine.wait(200)).then(() => {
                            // remaining slices consolidate into the front slots so there's no visible gap
                            const remaining = this.resultG.slices.slice(0, n1 - n2).filter(Boolean);
                            this.resultG.slices.length = 0;
                            const consolidateAnims = remaining.map((slice, k) => {
                                const slot = FractionGroup.slotFor(620, 340, lcd, k);
                                this.resultG.slices[k] = slice;
                                return slice.flyTo({ ...slot, color: Colors.result, opacity: 1, duration: 650, liftY: -35 });
                            });
                            this.resultG.moveLabel('Result');
                            return Promise.all(consolidateAnims);
                        });
                    } else {
                        sequence = sequence.then(() => { this.resultG.moveLabel('Result'); });
                    }

                    // finally, ensure the result group's bookkeeping (denom/empty slots beyond resultNumerator)
                    // is consistent so the next step (simplify) can build() on top of it correctly.
                    sequence = sequence.then(() => {
                        this.resultG._lastDenom = lcd;
                        return this.resultG.build(Math.abs(resultNumerator), 0, Colors.result);
                    });

                    return sequence.then(() => engine.wait(SETTLE_PAUSE));
                });

                // STEP 4: simplify (if applicable)
                if (simplified.d !== lcd || simplified.n !== Math.abs(resultNumerator)) {
                    steps.push(() => {
                        this.resultG.denom = simplified.d;
                        this.resultG.moveLabel(`Result (simplified)`);
                        const anim = this.resultG.build(simplified.n, 0, Colors.result);
                        this.setExplanation(`Simplify ${Math.abs(resultNumerator)}/${lcd} by dividing the top and bottom by their greatest common factor: <b>${simplified.n}/${simplified.d}</b>.`);
                        this.addMathLine(`= ${isNegative ? '-' : ''}${simplified.n}/${simplified.d}`);
                        return anim.then(() => engine.wait(500));
                    });
                }

                // STEP 5: convert to mixed number (if applicable)
                if (mixedResult.w > 0 && mixedResult.n > 0) {
                    steps.push(() => {
                        const finalFrac = new Fraction(mixedResult.w, mixedResult.n, mixedResult.d);
                        this.setExplanation(`Since the numerator is larger than the denominator, convert back to a mixed number: <b>${isNegative ? '-' : ''}${finalFrac.toHTML()}</b>. That's our final answer!`);
                        this.addMathLine(`= <b>${isNegative ? '-' : ''}${finalFrac.toHTML()}</b>`);
                        return engine.wait(300);
                    });
                } else {
                    steps.push(() => {
                        const finalDisplay = simplified.n === 0 ? '0' : (simplified.d === 1 ? `${simplified.n}` : `${simplified.n}/${simplified.d}`);
                        this.setExplanation(`Final answer: <b>${isNegative ? '-' : ''}${finalDisplay}</b>.`);
                        this.addMathLine(`= <b>${isNegative ? '-' : ''}${finalDisplay}</b>`);
                        return engine.wait(300);
                    });
                }

                return steps;
            }

            updateButtons() {
                const atEnd = this.stepIndex >= this.steps.length - 1 && this.steps.length > 0;
                document.getElementById('btn-step').disabled = atEnd;
                document.getElementById('btn-play').disabled = this.playing || atEnd;
                document.getElementById('btn-pause').disabled = !this.playing;
            }

            async nextStep() {
                if (this.steps.length === 0 || this.stepIndex === -1) {
                    this.steps = this.buildSteps();
                    this.stepIndex = 0;
                } else if (this.stepIndex < this.steps.length - 1) {
                    this.stepIndex++;
                } else {
                    this.updateButtons();
                    return; // already at end
                }
                this.updateButtons();
                await this.steps[this.stepIndex]();
                this.updateButtons();
            }

            async play() {
                if (this.playing) return;
                this.playing = true;
                engine.isPaused = false;
                this.updateButtons();
                while (this.playing && (this.stepIndex === -1 || this.stepIndex < this.steps.length - 1)) {
                    await this.nextStep();
                    if (!this.playing) break;
                    await engine.wait(1100);
                }
                this.playing = false;
                this.updateButtons();
            }

            pause() {
                this.playing = false;
                this.updateButtons();
            }

            reset() {
                this.playing = false;
                this.steps = [];
                this.stepIndex = -1;
                this.clearCanvas();
                this.clearMath();
                this.setExplanation('Enter fractions and click Play or Next Step.');
                this.updateButtons();
            }
        }

        const sim = new Simulation();
        const ui = {
            updateSpeed: () => {
                const v = parseFloat(document.getElementById('speed-slider').value);
                speedFactor = v;
                document.getElementById('speed-label').textContent = v + 'x';
            },
            updateInputVisibility: (id) => { document.getElementById(`w-${id}`).style.display = document.getElementById(`type-${id}`).value === 'mixed' ? 'block' : 'none'; },
            randomize: () => {
                const useMixed1 = Math.random() < 0.4;
                const useMixed2 = Math.random() < 0.4;
                const d1 = 2 + Math.floor(Math.random() * 10);
                const d2 = 2 + Math.floor(Math.random() * 10);
                document.getElementById('type-f1').value = useMixed1 ? 'mixed' : 'proper';
                document.getElementById('type-f2').value = useMixed2 ? 'mixed' : 'proper';
                document.getElementById('w-f1').value = useMixed1 ? (1 + Math.floor(Math.random() * 3)) : 0;
                document.getElementById('w-f2').value = useMixed2 ? (1 + Math.floor(Math.random() * 3)) : 0;
                document.getElementById('n-f1').value = 1 + Math.floor(Math.random() * (d1 - 1));
                document.getElementById('d-f1').value = d1;
                document.getElementById('n-f2').value = 1 + Math.floor(Math.random() * (d2 - 1));
                document.getElementById('d-f2').value = d2;
                document.getElementById('operator').value = Math.random() < 0.5 ? '+' : '-';
                ui.updateInputVisibility('f1');
                ui.updateInputVisibility('f2');
                sim.reset();
            }
        };

        window.onload = () => { ui.randomize(); };
    </script>
</body>
</html>
