<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic Structure Simulation | परमाणु संरचना सिमुलेशन</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4ef;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #2c2c2a;
    --text2: #5f5e5a;
    --text3: #888780;
    --info-bg: #e6f1fb;
    --info-text: #185fa5;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --surface: #2a2a28;
      --surface2: #242422;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --text: #e2e0d8;
      --text2: #b4b2a9;
      --text3: #888780;
      --info-bg: #0c3460;
      --info-text: #85b7eb;
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  #app { max-width: 760px; margin: 0 auto; }
  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .title { font-size: 20px; font-weight: 500; color: var(--text); }
  .subtitle { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .lang-group { display: flex; gap: 6px; flex-shrink: 0; }
  .lang-btn {
    font-size: 13px; padding: 5px 14px;
    border: 0.5px solid var(--border2); border-radius: 20px;
    cursor: pointer; background: transparent; color: var(--text2);
    font-family: var(--font); transition: all 0.15s;
  }
  .lang-btn.active { background: var(--info-bg); color: var(--info-text); border-color: transparent; }
  .layout { display: grid; grid-template-columns: 190px 1fr; gap: 16px; align-items: start; }
  @media (max-width: 580px) { .layout { grid-template-columns: 1fr; } }
  .section-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .element-list { display: flex; flex-direction: column; gap: 1px; max-height: 500px; overflow-y: auto; }
  .el-btn {
    text-align: left; padding: 7px 10px; border-radius: var(--radius-md);
    border: 0.5px solid transparent; cursor: pointer; background: transparent;
    font-size: 13px; color: var(--text2); display: flex; align-items: center;
    gap: 8px; transition: background 0.12s; font-family: var(--font); width: 100%;
  }
  .el-btn:hover { background: var(--surface2); }
  .el-btn.active { background: var(--info-bg); color: var(--info-text); }
  .el-btn .sym { font-weight: 500; font-size: 14px; min-width: 24px; }
  .el-btn .num { font-size: 11px; opacity: 0.7; margin-left: auto; }
  .viz-panel {
    background: var(--surface2); border-radius: var(--radius-lg);
    padding: 16px; border: 0.5px solid var(--border);
  }
  canvas { display: block; margin: 0 auto; max-width: 100%; }
  .config-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; color: var(--text2); }
  .config-row input[type=range] { flex: 1; accent-color: var(--info-text); }
  .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
  @media (max-width: 480px) { .info-grid { grid-template-columns: repeat(2, 1fr); } }
  .info-card {
    background: var(--surface); border-radius: var(--radius-md);
    border: 0.5px solid var(--border); padding: 8px 10px;
  }
  .info-card .lbl { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .info-card .val { font-size: 15px; font-weight: 500; color: var(--text); }
  .shell-info { margin-top: 10px; font-size: 12px; color: var(--text3); text-align: center; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .footer { margin-top: 20px; text-align: center; font-size: 11px; color: var(--text3); }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div>
      <div class="title" id="main-title">Atomic Structure Simulation</div>
      <div class="subtitle" id="main-sub">Select an element to view its electron configuration</div>
    </div>
    <div class="lang-group">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
      <button class="lang-btn" id="btn-ne" onclick="setLang('ne')">नेपाली</button>
    </div>
  </div>

  <div class="layout">
    <div>
      <div class="section-label" id="lbl-elements">Elements (Z = 1–20)</div>
      <div class="element-list" id="el-list"></div>
    </div>
    <div class="viz-panel">
      <div class="config-row">
        <span id="lbl-speed">Speed:</span>
        <input type="range" id="speed-slider" min="0.2" max="3" step="0.1" value="1">
        <span id="speed-val" style="font-size:13px;font-weight:500;min-width:32px;">1.0×</span>
      </div>
      <canvas id="atomCanvas" width="430" height="340"></canvas>
      <div class="legend" id="shell-legend"></div>
      <div class="info-grid">
        <div class="info-card"><div class="lbl" id="lbl-name">Name</div><div class="val" id="val-name">Hydrogen</div></div>
        <div class="info-card"><div class="lbl" id="lbl-z">Atomic No.</div><div class="val" id="val-z">1</div></div>
        <div class="info-card"><div class="lbl" id="lbl-mass">Mass (u)</div><div class="val" id="val-mass">1.008</div></div>
        <div class="info-card"><div class="lbl" id="lbl-config">Config.</div><div class="val" id="val-config">1s¹</div></div>
      </div>
      <div class="shell-info" id="val-shells"></div>
    </div>
  </div>
  <div class="footer">Developed by Basanta Bhattarai &nbsp;|&nbsp; Hydrogen → Calcium (Z 1–20)</div>
</div>

<script>
const elements = [
  {sym:'H',  en:'Hydrogen',   ne:'हाइड्रोजन',   Z:1,  mass:1.008,  shells:[1],       config:'1s¹'},
  {sym:'He', en:'Helium',     ne:'हेलियम',       Z:2,  mass:4.003,  shells:[2],       config:'1s²'},
  {sym:'Li', en:'Lithium',    ne:'लिथियम',       Z:3,  mass:6.941,  shells:[2,1],     config:'[He] 2s¹'},
  {sym:'Be', en:'Beryllium',  ne:'बेरिलियम',     Z:4,  mass:9.012,  shells:[2,2],     config:'[He] 2s²'},
  {sym:'B',  en:'Boron',      ne:'बोरन',         Z:5,  mass:10.81,  shells:[2,3],     config:'[He] 2s²2p¹'},
  {sym:'C',  en:'Carbon',     ne:'कार्बन',       Z:6,  mass:12.011, shells:[2,4],     config:'[He] 2s²2p²'},
  {sym:'N',  en:'Nitrogen',   ne:'नाइट्रोजन',   Z:7,  mass:14.007, shells:[2,5],     config:'[He] 2s²2p³'},
  {sym:'O',  en:'Oxygen',     ne:'अक्सिजन',     Z:8,  mass:15.999, shells:[2,6],     config:'[He] 2s²2p⁴'},
  {sym:'F',  en:'Fluorine',   ne:'फ्लुओरिन',    Z:9,  mass:18.998, shells:[2,7],     config:'[He] 2s²2p⁵'},
  {sym:'Ne', en:'Neon',       ne:'नियोन',        Z:10, mass:20.180, shells:[2,8],     config:'[He] 2s²2p⁶'},
  {sym:'Na', en:'Sodium',     ne:'सोडियम',       Z:11, mass:22.990, shells:[2,8,1],   config:'[Ne] 3s¹'},
  {sym:'Mg', en:'Magnesium',  ne:'म्याग्नेसियम', Z:12, mass:24.305, shells:[2,8,2],   config:'[Ne] 3s²'},
  {sym:'Al', en:'Aluminium',  ne:'एल्युमिनियम', Z:13, mass:26.982, shells:[2,8,3],   config:'[Ne] 3s²3p¹'},
  {sym:'Si', en:'Silicon',    ne:'सिलिकन',       Z:14, mass:28.086, shells:[2,8,4],   config:'[Ne] 3s²3p²'},
  {sym:'P',  en:'Phosphorus', ne:'फस्फोरस',      Z:15, mass:30.974, shells:[2,8,5],   config:'[Ne] 3s²3p³'},
  {sym:'S',  en:'Sulfur',     ne:'सल्फर',        Z:16, mass:32.06,  shells:[2,8,6],   config:'[Ne] 3s²3p⁴'},
  {sym:'Cl', en:'Chlorine',   ne:'क्लोरिन',      Z:17, mass:35.45,  shells:[2,8,7],   config:'[Ne] 3s²3p⁵'},
  {sym:'Ar', en:'Argon',      ne:'आर्गन',        Z:18, mass:39.948, shells:[2,8,8],   config:'[Ne] 3s²3p⁶'},
  {sym:'K',  en:'Potassium',  ne:'पोटासियम',     Z:19, mass:39.098, shells:[2,8,8,1], config:'[Ar] 4s¹'},
  {sym:'Ca', en:'Calcium',    ne:'क्याल्सियम',   Z:20, mass:40.078, shells:[2,8,8,2], config:'[Ar] 4s²'},
];

const shellColors  = ['#378ADD','#1D9E75','#D85A30','#D4537E'];
const shellNames   = {en:['K shell','L shell','M shell','N shell'], ne:['K कोश','L कोश','M कोश','N कोश']};
const shellRadii   = [58, 98, 140, 182];

let lang = 'en';
let currentEl = 0;
let angles = [];
let baseSpeeds = [];
let speedMul = 1.0;
let animId = null;

const canvas = document.getElementById('atomCanvas');
const ctx = canvas.getContext('2d');

function initAngles(el) {
  angles = el.shells.map((n, si) =>
    Array.from({length: n}, (_, i) => (2 * Math.PI * i) / n + si * 0.4)
  );
  baseSpeeds = el.shells.map((_, si) => 0.55 - si * 0.1);
}

function isDark() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function drawAtom(el) {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  ctx.clearRect(0, 0, W, H);

  const dark = isDark();
  const orbitStroke = dark ? 'rgba(200,200,200,0.15)' : 'rgba(80,80,80,0.12)';
  const nucleusFill = dark ? '#0c3460' : '#e6f1fb';
  const nucleusStroke = dark ? '#4a90d9' : '#185fa5';
  const nucleusText = dark ? '#85b7eb' : '#185fa5';

  /* orbit rings */
  el.shells.forEach((_, si) => {
    ctx.beginPath();
    ctx.arc(cx, cy, shellRadii[si], 0, 2 * Math.PI);
    ctx.strokeStyle = orbitStroke;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  /* nucleus */
  const nr = 36;
  ctx.beginPath();
  ctx.arc(cx, cy, nr, 0, 2 * Math.PI);
  ctx.fillStyle = nucleusFill;
  ctx.fill();
  ctx.strokeStyle = nucleusStroke;
  ctx.lineWidth = 2;
  ctx.stroke();

  /* proton and neutron counts as text inside nucleus */
  const protons = el.Z;
  const neutrons = Math.round(el.mass) - protons;
  const bodyFont = getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  /* proton line: red "p+" label + count */
  ctx.font = 'bold 10px ' + bodyFont;
  ctx.fillStyle = '#E24B4A';
  ctx.fillText('p\u207A: ' + protons, cx, cy - 9);

  /* neutron line: gray "n⁰" label + count */
  ctx.font = 'bold 10px ' + bodyFont;
  ctx.fillStyle = dark ? '#b4b2a9' : '#5f5e5a';
  ctx.fillText('n\u2070: ' + neutrons, cx, cy + 9);

  /* electrons */
  el.shells.forEach((n, si) => {
    const color = shellColors[si];
    angles[si].forEach(a => {
      const ex = cx + shellRadii[si] * Math.cos(a);
      const ey = cy + shellRadii[si] * Math.sin(a);
      ctx.beginPath();
      ctx.arc(ex, ey, 7, 0, 2 * Math.PI);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = dark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('e⁻', ex, ey);
    });
  });

  /* shell labels on left */
  ctx.font = '11px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'left';
  el.shells.forEach((n, si) => {
    const label = 'KLMN'[si] + ':' + n;
    ctx.fillStyle = shellColors[si];
    ctx.fillText(label, 8, 18 + si * 16);
  });
}

function animate() {
  const el = elements[currentEl];
  const dt = 0.013 * speedMul;
  el.shells.forEach((_, si) => {
    const spd = baseSpeeds[si] * dt;
    angles[si] = angles[si].map(a => a + spd);
  });
  drawAtom(el);
  animId = requestAnimationFrame(animate);
}

function selectElement(idx) {
  currentEl = idx;
  document.querySelectorAll('.el-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  initAngles(elements[idx]);
  updateInfo(elements[idx]);
  buildLegend(elements[idx]);
}

function updateInfo(el) {
  document.getElementById('val-name').textContent = lang === 'en' ? el.en : el.ne;
  document.getElementById('val-z').textContent = el.Z;
  document.getElementById('val-mass').textContent = el.mass.toFixed(3);
  document.getElementById('val-config').textContent = el.config;
  const shellLabel = lang === 'en' ? 'Shell distribution' : 'कोश वितरण';
  document.getElementById('val-shells').textContent =
    shellLabel + ': ' + el.shells.map((n, i) => 'KLMN'[i] + '=' + n + 'e⁻').join('  ');
}

function buildLegend(el) {
  const leg = document.getElementById('shell-legend');
  leg.innerHTML = '';
  el.shells.forEach((n, si) => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<span class="legend-dot" style="background:${shellColors[si]}"></span>
      <span>${shellNames[lang][si]} (${n}e⁻)</span>`;
    leg.appendChild(div);
  });
}

const T = {
  en: {
    title: 'Atomic Structure Simulation',
    sub: 'Select an element to view its electron configuration',
    elements: 'Elements (Z = 1–20)',
    speed: 'Speed:',
    name: 'Name', z: 'Atomic No.', mass: 'Mass (u)', config: 'Configuration'
  },
  ne: {
    title: 'परमाणु संरचना सिमुलेशन',
    sub: 'इलेक्ट्रोन विन्यास हेर्न तत्व चुन्नुहोस्',
    elements: 'तत्वहरू (Z = १–२०)',
    speed: 'गति:',
    name: 'नाम', z: 'परमाणु संख्या', mass: 'द्रव्यमान (u)', config: 'विन्यास'
  }
};

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-ne').classList.toggle('active', l === 'ne');
  document.documentElement.lang = l === 'ne' ? 'ne' : 'en';
  const t = T[l];
  document.getElementById('main-title').textContent = t.title;
  document.getElementById('main-sub').textContent = t.sub;
  document.getElementById('lbl-elements').textContent = t.elements;
  document.getElementById('lbl-speed').textContent = t.speed;
  document.getElementById('lbl-name').textContent = t.name;
  document.getElementById('lbl-z').textContent = t.z;
  document.getElementById('lbl-mass').textContent = t.mass;
  document.getElementById('lbl-config').textContent = t.config;
  buildList();
  updateInfo(elements[currentEl]);
  buildLegend(elements[currentEl]);
}

function buildList() {
  const list = document.getElementById('el-list');
  list.innerHTML = '';
  elements.forEach((el, i) => {
    const b = document.createElement('button');
    b.className = 'el-btn' + (i === currentEl ? ' active' : '');
    b.innerHTML = `<span class="sym">${el.sym}</span><span>${lang === 'en' ? el.en : el.ne}</span><span class="num">${el.Z}</span>`;
    b.onclick = () => selectElement(i);
    list.appendChild(b);
  });
}

document.getElementById('speed-slider').addEventListener('input', function () {
  speedMul = parseFloat(this.value);
  document.getElementById('speed-val').textContent = speedMul.toFixed(1) + '×';
});

/* init */
buildList();
initAngles(elements[0]);
updateInfo(elements[0]);
buildLegend(elements[0]);
if (animId) cancelAnimationFrame(animId);
animate();
</script>
</body>
</html>
