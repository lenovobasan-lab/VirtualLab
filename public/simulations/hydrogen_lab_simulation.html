i:"शुरु गर्नु अघि उपकरणहरू हेरौं: दानेदार जस्ता (Zn) राखिएको दुईवटा घाँटी भएको उल्फको बोतल। एउटा घाँटीमा थिसल फनेल र अर्को घाँटीमा निकास नली जोडिएको बिर्को हालिन्छ। निकास नलीलाई पानीको भाँडोभित्र अवस्थित बिहाइभ सेल्फमुनि हुँदै उल्टो पारिएको ग्याँस जारमा पठाइन्छ।"},actionText:{english:"Prepare granulated Zinc (Zn)",nepali:"दानेदार जस्ता जडान सक्रिय गर्नुहोस्"}},{id:2,title:{english:"2. Adding Hydrochloric Acid",nepali:"२. हाइड्रोक्लोरिक अम्ल हाल्ने"},shortDesc:{english:"Pour dilute hydrochloric acid (HCl) through the thistle funnel.",nepali:"थिसल फनेल (सोली) बाट हल्का हाइड्रोक्लोरिक अम्ल (HCl) हाल्नुहोस्।"},fullDesc:{english:"Pour dilute hydrochloric acid (HCl) slowly through the thistle funnel. **Crucial safety precaution**: The bottom end of the thistle funnel must be fully submerged below the acid inside the Woulfe's bottle. Otherwise, the generated hydrogen gas will escape backwards through the funnel instead of traveling down the delivery tube!",nepali:"थिस्ल फनेलबाट बिस्तारै हल्का हाइड्रोक्लोरिक अम्ल (HCl) हाल्नुहोस्। **महत्वपूर्ण सावधानी**: थिस्ल फनेलको तल्लो मुख अम्ल र जस्ताको तरल सतहभित्र डुबेको हुनुपर्दछ। अन्यथा, बन्ने हाइड्रोजन ग्याँस निकास नलीबाट जानुको सट्टा फनेलबाटै बाहिर निस्केर उम्किनेछ!"},actionText:{english:"Pour dilute HCl Acid",nepali:"हल्का HCl अम्ल खन्याउनुहोस्"}},{id:3,title:{english:"3. Chemical Reaction Initiation",nepali:"३. रासायनिक प्रतिक्रिया सुरु"},shortDesc:{english:"Watch the reaction between Zinc and Hydrochloric acid progress.",nepali:"जस्ता र हाइड्रोक्लोरिक अम्ल बीचको रासायनिक प्रतिक्रिया हेर्नुहोस्।"},fullDesc:{english:`As dilute HCl wets the granulated zinc, bubbles of hydrogen gas immediately start popping up on the zinc surface. Zinc displaces hydrogen from the acid, forming Zinc Chloride salt and hydrogen gas: 

$$\\text{Zn (s)} + 2\\text{HCl (aq)} \\rightarrow \\text{ZnCl}_2\\text{ (aq)} + \\text{H}_2\\text{ (g)} \\uparrow$$`,nepali:`जब हल्का हाइड्रोक्लोरिक अम्ल दानेदार जस्ताको सम्पर्कमा आउँछ, जस्ताको सतहमा हाइड्रोजन ग्याँसका स-साना फोकाहरू सिर्जना हुन थाल्छन्। जस्ताले अम्लबाट हाइड्रोजन विस्थापित गरेर जस्ता क्लोराइड र हाइड्रोजन ग्याँस बनाउँदछ:

$$\\text{Zn} + 2\\text{HCl} \\rightarrow \\text{ZnCl}_2 + \\text{H}_2 \\uparrow$$`},actionText:{english:"Start Chemical Reaction",nepali:"रासायनिक प्रतिक्रिया सुरु गर्नुहोस्"}},{id:4,title:{english:"4. Downward Displacement of Water",nepali:"४. पानीको तलतिरको विस्थापन"},shortDesc:{english:"Observe gas traveling and collecting in the inverted jar.",nepali:"निकास नली हुँदै ग्याँस बग्ने र उल्टो जारमा संकलन भएको हेर्नुहोस्।"},fullDesc:{english:"Hydrogen gas bubbles flow through the glass delivery tube and rise inside the inverted gas jar. Since hydrogen is extremely insoluble in water and lighter than water, it displaces the water downward, filling up the top of the gas jar. This collection technique is known as the **Downward Displacement of Water**.",nepali:"हाइड्रोजन ग्याँसका बुदबुदहरू सिसाको निकास नली हुँदै बगेर जान्छन् र पानीको माध्यमबाट हुँदै उल्टो पारिएको ग्याँस जारको माथिल्लो भागमा जम्मा हुन्छन्। हाइड्रोजन ग्याँस पानीमा नघुलिने र पानीभन्दा धेरै हल्का हुनाले, यसले जारमा भएको पानीलाई तलतिर धकेल्छ। यसलाई **पानीको तलतिरको विस्थापन** भनिन्छ।"},actionText:{english:"Collect Hydrogen Gas",nepali:"हाइड्रोजन ग्याँस संकलन गर्नुहोस्"}},{id:5,title:{english:"5. The Pop Sound & Blue Flame Test",nepali:"५. मैनबत्ती निभ्ने र पप आवाज परीक्षण"},shortDesc:{english:"Bring a burning candle to test the hydrogen gas jar.",nepali:"ग्याँस जार नजिक बलिरहेको मैनबत्ती ल्याई परीक्षण गर्नुहोस्।"},fullDesc:{english:"Take the gas jar out of the trough (keeping its mouth inverted of course, since hydrogen is lighter than air and escapes quickly if inverted upwards). Bring a burning candle to its mouth. You will hear a characteristic **POP sound!** and observe a **pale blue flame** at the mouth, while the burning candle itself inside the jar **extinguishes** (because hydrogen is highly combustible but is not a supporter of combustion!). Click 'Perform Candle Test' to run this interaction.",nepali:"जारलाई पानीको भाँडोबाट सावधानीपूर्वक बाहिर निकाल्नुहोस् (मुख तलतिरै राखेर, नत्र ग्याँस तुरुन्त उडेर जान्छ)। बलिरहेको मैनबत्तीलाई जारको मुख नजिक लैजानुहोस्। त्यहाँ एउटा **'पप' आवाज** सुनिनुका साथै **हल्का नीलो ज्वाला (pale blue flame)** बल्नेछ भने भाँडोभित्र राखिएको मैनबत्ती आफू चाहिँ **निभ्नेछ** (किनभने हाइड्रोजन आफै बल्छ तर बलिरहन मद्दत गर्दैन)।"},actionText:{english:"Perform Candle Test",nepali:"मैनबत्ती परीक्षण गर्नुहोस्"}}],hm=[{english:"The entire apparatus must be air-tight to prevent hydrogen leakages.",nepali:"हाइड्रोजन चुहावट रोक्न र दुर्घटनाबाट बच्न सम्पूर्ण उपकरण वायुरोधी (airtight) हुनुपर्दछ।"},{english:"The lower end of the thistle funnel must be dipped well below the acid surface.",nepali:"थिस्ल फनेलको तल्लो भाग अम्ल वा तरल सतह भन्दा धेरै तल डुबेको हुनुपर्दछ ताकि ग्याँस फनेलबाट फुत्किन नपाओस्।"},{english:"Hydrogen gas is highly explosive when mixed with air. Do not light a flame near the generator bottle.",nepali:"हावासँग मिसिँदा हाइड्रोजन ग्याँस अत्यधिक विस्फोटक हुन्छ। मुख्य रासायनिक बोतल नजिक मैनबत्ती नबाल्नुहोस्।"},{english:"Wait for initial air inside the Woulfe's bottle to be driven out before collecting pure hydrogen.",nepali:"शुद्ध हाइड्रोजन जम्मा गर्नु अघि उल्फको बोतलभित्रको सुरुवाती हावा पूरै बाहिर निस्कन दिनुपर्छ।"}],Xe=[{name:{english:"Thistle Funnel",nepali:"थिसल फनेल (थिसल सोली)"},description:{english:"A chemistry funnel designed to pour dilute acid liquid safely to the bottom of the reaction flask without letting gas leak.",nepali:"रासायनिक प्रतिक्रिया बोतलको फेदसम्म अम्ल सुरक्षित रूपमा पठाउन प्रयोग गरिने लामो सोली।"},x:180,y:110},{name:{english:"Woulfe's Bottle",nepali:"उल्फको बोतल"},formula:"Reaction: Zn + 2HCl",description:{english:"A glass bottle with two necks, used in gas preparation labs to simultaneously inject acid and deliver generated gas.",nepali:"ग्याँस उत्पादन गर्नका लागि रसायनशास्त्र प्रयोगशालामा प्रयोग गरिने दुईवटा घाँटी भएको विशेष सग्लो सिसाको बोतल।"},x:230,y:280},{name:{english:"Delivery Tube",nepali:"निकास नली"},description:{english:"A hollow bent glass tube which safely routes the generated hydrogen gas from the Woulfe's bottle to the water trough.",nepali:"तयार पारिएको ग्याँसलाई उल्फको बोतलबाट पानीको भाँडोसम्म पुर्‍याउने एउटा बाङ्गो सिसाको पाइप वा नली।"},x:350,y:160},{name:{english:"Inverted Gas Jar",nepali:"उल्टो पारिएको ग्याँस जार"},formula:"H2 Gas Collector",description:{english:"A heavy cylindrical glass jar placed upside down inside water to collect insoluble and light gases.",nepali:"पानीभन्दा हल्का र नघुलिने ग्याँस जम्मा गर्न पानीमाथि उल्टो पारेर राखिने बाक्लो सिसाको सिलिन्डर जार।"},x:520,y:230},{name:{english:"Beehive Shelf",nepali:"विहाइभ सेल्फ"},description:{english:"A heavy clay shelf with holes, positioned in water to support the inverted gas jar and safely guide the gas delivery tube underneath.",nepali:"पानीको बोतल भित्र उल्टो जारलाई अड्याउन र त्यसको मुनिबाट निकास नली छिराउन बनाइएको प्वाल भएको भारी माटोको स्ट्यान्ड।"},x:520,y:340},{name:{english:"Water Trough",nepali:"पानीको भाँडो"},description:{english:"A clean container holding water, used to perform underwater gas collection safely and visualize pure bubble capture.",nepali:"पानी भर्ने र ग्याँस संकलन गर्ने ठाउँ। यसले हावाको अक्सिजनबाट रासायनिक प्रतिक्रियालाई सुरक्षित राख्छ।"},x:430,y:350},{name:{english:"Granulated Zinc",nepali:"दानेदार जस्ता (Zn)"},formula:"Zn",description:{english:"Zinc granules with copper traces that act as a catalyst. Reacts actively with hydrochloric acid to release hydrogen.",nepali:"धातु तत्व जसले अम्लसँग प्रतिक्रिया गरेर हाइड्रोजन ग्याँसलाई विस्थापित गर्छ। तामाको मिसावटले यसमा उत्प्रेरकको काम गर्छ।"},x:170,y:320}],yf=[{id:1,question:{english:"What happens when a burning candle is brought close to the mouth of a jar containing hydrogen gas?",nepali:"हाइड्रोजन ग्याँस भएको जारको मुखमा बलिरहेको मैनबत्ती लैजाँदा के हुन्छ?"},options:{english:["The candle burns brighter with a brilliant white sparkle.","The candle flame extinguishes, and hydrogen gas burns with a POP sound and blue flame.","The gas jar instantly explodes violently, shattering into minor crystals.","The candle continues to burn steadily without any physical shift."],nepali:["मैनबत्ती अझ चम्किलो सेतो प्रकाशका साथ दन्केर बल्न थाल्छ।","मैनबत्तीको ज्वाला निभ्छ, र हाइड्रोजन ग्याँस 'पप' आवाजका साथ हल्का नीलो ज्वालामा बल्छ।","म्याग्नेसियम जस्तै ठूलो विस्फोट भई पूरै कोठा भरिन्छ।","मैनबत्ती कुनै परिवर्तन बिना सामान्य रूपमा बलिरहन्छ।"]},correctIdx:1,explanation:{english:"Hydrogen is highly combustible but **does not support combustion**. This double property means the burning candle is deprived of oxygen inside the jar and goes OUT, but the escaping hydrogen gas reacting with the air ignites at the mouth, giving a small pale blue flame and the explosive 'POP' sound.",nepali:"हाइड्रोजन आफैं प्रज्वलनशील (combustible) ग्याँस हो तर यसले बल्ने कार्यलाई मद्दत गर्दैन (not a supporter of combustion)। तसर्थ, अक्सिजनको अभावले बलिरहेको मैनबत्ती जारको मुख भित्र पुग्दा निभ्दछ, तर बाहिर निस्कने ग्याँस हावाको अक्सिजनसँग जोडिएर जल्दछ जसले सानो विस्फोटका साथ 'पप' आवाज र नीलो ज्वाला दिन्छ।"}},{id:2,question:{english:"Why is Nitric Acid (HNO₃) NOT used for the laboratory preparation of hydrogen gas?",nepali:"हाइड्रोजन ग्याँस बनाउनका लागि नाइट्रिक अम्ल (HNO₃) किन प्रयोग गरिँदैन?"},options:{english:["Nitric acid is a weak acid that refuses to dissolve zinc granules.","Nitric acid is a strong oxidizing agent that converts newly formed H₂ into water (H₂O).","Nitric acid disintegrates the glass Woulfe's bottle instantly.","It generates carbon dioxide rather than escaping hydrogen gas."],nepali:["नाइट्रिक अम्ल अति कमजोर अम्ल भएकाले यसले जस्तासँग कुनै प्रतिक्रिया गर्दैन।","नाइट्रिक अम्ल एक सशक्त अक्सिकारक (oxidizing agent) हो जसले उत्पादन भएको H₂ लाई पानी (H₂O) मा परिणत गरिदिन्छ।","यसले सिसाको बोतललाई क्षणभरमै पगालेर नष्ट पारिदिन्छ।","यसले हाइड्रोजनको सट्टा कार्बोनडाइअक्साइड ग्याँस उत्पादन गर्दछ।"]},correctIdx:1,explanation:{english:"Because nitric acid ($HNO_3$) is a powerful oxidizing agent, it readily donates oxygen atoms to the freshly generated hydrogen ($H_2$), oxidizing it into water ($H_2O$) while nitric acid itself gets reduced to nitrogen oxides. Thus, no hydrogen gas is obtained.",nepali:"नाइट्रिक अम्ल बलियो अक्सिडाइजिङ एजेन्ट भएकाले यसले नवजात हाइड्रोजन ग्याँसलाई पानी ($H_2O$) मा परिणत (अक्सिडाइज) गरिदिन्छ र आफू चाहिँ नाइट्रोजनका अक्साइडहरूमा रिड्युस हुन्छ। जसले गर्दा हाम्रो इच्छित हाइड्रोजन ग्याँस प्राप्त हुँदैन।"}},{id:3,question:{english:"Why is water displacement selected to collect hydrogen instead of air displacement?",nepali:"हाइड्रोजन ग्याँस जम्मा गर्न हावाको विस्थापनको सट्टा पानीको विस्थापन किन प्रयोग गरिन्छ?"},options:{english:["Hydrogen has exactly the same density as common room air, making it hard to trap.","Hydrogen reacts with air to form a highly explosive mixture, making air collection highly dangerous.","Hydrogen gas dissolves in water easily, purification is required.","Water adds weight to the gas which makes it visible to the human eye."],nepali:["हाइड्रोजनको घनत्व साधारण हावा जस्तै हुने भएकाले यसलाई छुट्याउन कठिन हुन्छ।","हाइड्रोजन हावासँग मिसिएर विस्फोटक मिश्रण बन्छ, त्यसैले हावा विस्थापन गरेर जम्मा गर्नु अत्यन्तै खतरनाक हुन्छ।","हाइड्रोजन पानीमा सजिलै घुल्छ, जसका कारण यसलाई शुद्ध बनाउन सकिन्छ।","पानीले ग्याँसमा धेरै वजन थप्छ जसले यसलाई देख्न मद्दत गर्दछ।"]},correctIdx:1,explanation:{english:"While hydrogen is lighter than air, collecting it via displacement of air is very dangerous. Any leak or mix with atmospheric oxygen creates a highly explosive setup. Collecting over water is safe because hydrogen is insoluble and isolates the gas safely from air.",nepali:"हाइड्रोजन हावाभन्दा निकै हल्का भए तापनि यसलाई हावाको विस्थापनबाट संकलन गर्दा वातावरणको अक्सिजनसँग मिसिएर ठूलो विस्फोट हुने डर हुन्छ। पानीमा यो नपग्लने भएकाले पानीमा संकलन गर्नु सबभन्दा सुरक्षित विधि हो।"}},{id:4,question:{english:"Which of the following is the correct chemical equation representing this lab preparation?",nepali:"यस प्रयोगशाला तयारीको सही रासायनिक समीकरण कुन हो?"},options:{english:["Zn (s) + H₂O (l) -> ZnO (s) + H₂ (g)↑","Zn (s) + 2HCl (aq) -> ZnCl₂ (aq) + H₂ (g)↑","Zn (s) + H₂CO₃ (aq) -> ZnCO₃ (s) + H₂ (g)↑","ZnO (s) + 2HCl (aq) -> ZnCl₂ (aq) + H₂O (l)"],nepali:["Zn (s) + H₂O (l) -> ZnO (s) + H₂ (g)↑","Zn (s) + 2HCl (aq) -> ZnCl₂ (aq) + H₂ (g)↑","Zn (s) + H₂CO₃ (aq) -> ZnCO₃ (s) + H₂ (g)↑","ZnO (s) + 2HCl (aq) -> ZnCl₂ (aq) + H₂O (l)"]},correctIdx:1,explanation:{english:"Granulated Zinc reacts with dilute Hydrochloric Acid to give Zinc Chloride salt dissolved in water, and hydrogen gas releases as bubbles: Zn (s) + 2HCl (aq) -> ZnCl2 (aq) + H2 (g)↑.",nepali:"दानेदार जस्ताले हल्का हाइड्रोक्लोरिक अम्लसँग रासायनिक प्रतिक्रिया गर्दा जस्ता क्लोराइड लवण र हाइड्रोजन ग्याँस उत्पन्न हुन्छ: Zn (s) + 2HCl (aq) -> ZnCl२ (aq) + H२ (g)↑।"}},{id:5,question:{english:"What catalytic impurity is present in granulated zinc that helps quicken this reaction?",nepali:"दानेदार जस्तामा कुन धातुको अशुद्धता वा मात्रा रहेको हुन्छ जसले प्रतिक्रिया बढाउन मद्दत गर्छ?"},options:{english:["Traces of Gold (Au) which absorb hydrochloric ions.","Traces of Copper (Cu) which acts as a catalyst to boost the reaction rate.","Traces of Sodium (Na) which react with water.","Zinc possesses no impurities; it is 100% molecularly pure."],nepali:["सुनको अंश जसले हाइड्रोक्लोरिक आयनहरूलाई आकर्षित गर्दछ।","तामा (Copper - Cu) को स-साना अंश जसले जस्ता र अम्लको प्रतिक्रियामा उत्प्रेरकको काम गर्छ।","सोडियमको स-साना अंश जसले पानीसँग प्रतिक्रिया गर्छ।","दानेदार जस्तामा कुनै अशुद्धता हुँदैन; यो शतप्रतिशत शुद्ध हुन्छ।"]},correctIdx:1,explanation:{english:"Granulated zinc contains trace copper (Cu) impurities. In the presence of copper, a micro electrochemical cell formation occurs that dramatically lowers the activation energy, acting as an internal catalyst to speed up gas production.",nepali:"दानेदार जस्ता रासायनिक उद्योग वा खानीमा तयार पार्दा त्यसमा थोरै तामा (Copper) को मात्रा मिसिएको हुन्छ। यो तामाको टुक्राले रासायनिक प्रतिक्रियामा आन्तरिक उत्प्रेरक (catalyst) को भूमिका निर्वाह गरी प्रतिक्रियालाई तीब्र बनाउँछ।"}}],mm=({language:v,currentStep:O,reactionProgress:C,glassJarWaterLevel:h,is
